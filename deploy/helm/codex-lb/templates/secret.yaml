{{- if and (not .Values.auth.existingSecret) (not .Values.externalSecrets.enabled) }}
{{- $encKey := .Values.encryptionKey | default "" -}}
{{- if not $encKey -}}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "codex-lb.fullname" .)) -}}
  {{- if $existingSecret -}}
    {{- $encKeyName := .Values.auth.secretKeys.encryptionKey -}}
    {{- $existing := index $existingSecret.data $encKeyName | default "" -}}
    {{- if $existing -}}
      {{- $encKey = $existing | b64dec -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if not $encKey -}}
  {{- $encKey = randBytes 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "codex-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- if not .Values.externalDatabase.existingSecret }}
  {{ .Values.auth.secretKeys.databaseUrl }}: {{ include "codex-lb.databaseUrl" . | quote }}
  {{- end }}
  {{ .Values.auth.secretKeys.encryptionKey }}: {{ $encKey | quote }}
{{- end }}
