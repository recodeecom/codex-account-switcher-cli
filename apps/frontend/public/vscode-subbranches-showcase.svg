<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">VS Code subbranch workflow showcase</title>
  <desc id="desc">Stylized VS Code window showing multiple subbranches with modified files and commit activity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0a1224" />
      <stop offset="100%" stop-color="#0b1326" />
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1f29" />
      <stop offset="100%" stop-color="#151922" />
    </linearGradient>
    <linearGradient id="editor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1118" />
      <stop offset="100%" stop-color="#0b0f16" />
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#065f46" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45" />
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: "IBM Plex Sans", "Segoe UI", Roboto, sans-serif; }
      .muted { fill: #8b98b2; }
      .line { fill: #273042; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <ellipse cx="250" cy="120" rx="220" ry="90" fill="#1d4ed8" opacity="0.18" filter="url(#soft)" />
  <ellipse cx="1420" cy="780" rx="260" ry="120" fill="#10b981" opacity="0.14" filter="url(#soft)" />

  <g filter="url(#shadow)">
    <rect x="120" y="84" width="1360" height="732" rx="24" fill="url(#window)" stroke="#2a3242" stroke-width="2" />

    <rect x="120" y="84" width="1360" height="54" rx="24" fill="#202635" />
    <rect x="120" y="114" width="1360" height="24" fill="#202635" />

    <circle cx="155" cy="111" r="6" fill="#ef4444" />
    <circle cx="179" cy="111" r="6" fill="#f59e0b" />
    <circle cx="203" cy="111" r="6" fill="#10b981" />

    <rect x="250" y="98" width="460" height="28" rx="8" fill="#111827" stroke="#344054" />
    <text x="268" y="117" class="mono" font-size="13" fill="#9fb0d0">agent_integrator__dev-ui-refresh</text>

    <rect x="724" y="98" width="262" height="28" rx="8" fill="#0f172a" stroke="#334155" />
    <text x="742" y="117" class="mono" font-size="13" fill="#8dd3ff">source-control.tsx</text>

    <rect x="999" y="98" width="192" height="28" rx="8" fill="#0f172a" stroke="#334155" />
    <text x="1017" y="117" class="mono" font-size="13" fill="#8dd3ff">commit-view.tsx</text>

    <rect x="120" y="138" width="70" height="678" fill="#161c2a" />
    <rect x="190" y="138" width="360" height="678" fill="#131a27" />
    <rect x="550" y="138" width="930" height="678" fill="url(#editor)" />

    <rect x="120" y="190" width="4" height="44" fill="#38bdf8" />
    <g fill="#7f8aa4">
      <rect x="143" y="170" width="24" height="24" rx="5" />
      <rect x="143" y="210" width="24" height="24" rx="5" />
      <rect x="143" y="250" width="24" height="24" rx="5" />
      <rect x="143" y="290" width="24" height="24" rx="5" />
      <rect x="143" y="330" width="24" height="24" rx="5" />
      <rect x="143" y="370" width="24" height="24" rx="5" />
      <rect x="143" y="410" width="24" height="24" rx="5" />
    </g>

    <text x="214" y="168" class="sans" font-size="14" fill="#c8d4ee" font-weight="600">SOURCE CONTROL</text>

    <rect x="214" y="188" width="314" height="34" rx="8" fill="#0f172a" stroke="#30415f" />
    <text x="228" y="210" class="mono" font-size="12" fill="#93c5fd">subbranch/auth-session-fix</text>
    <text x="513" y="210" class="mono" font-size="12" fill="#34d399">8</text>

    <rect x="214" y="232" width="314" height="34" rx="8" fill="#0f172a" stroke="#30415f" />
    <text x="228" y="254" class="mono" font-size="12" fill="#93c5fd">subbranch/dashboard-quota-ui</text>
    <text x="513" y="254" class="mono" font-size="12" fill="#34d399">11</text>

    <rect x="214" y="276" width="314" height="34" rx="8" fill="#0f172a" stroke="#30415f" />
    <text x="228" y="298" class="mono" font-size="12" fill="#93c5fd">subbranch/branch-merge-guard</text>
    <text x="513" y="298" class="mono" font-size="12" fill="#34d399">5</text>

    <rect x="214" y="328" width="314" height="474" rx="10" fill="#0e1522" stroke="#23314a" />

    <text x="228" y="356" class="mono" font-size="12" fill="#6ee7b7">M</text>
    <text x="248" y="356" class="mono" font-size="12" fill="#aab7d1">apps/frontend/src/features/coming-soon/coming-soon-page.tsx</text>

    <text x="228" y="384" class="mono" font-size="12" fill="#6ee7b7">M</text>
    <text x="248" y="384" class="mono" font-size="12" fill="#aab7d1">apps/frontend/src/features/dashboard/account-card.tsx</text>

    <text x="228" y="412" class="mono" font-size="12" fill="#60a5fa">A</text>
    <text x="248" y="412" class="mono" font-size="12" fill="#aab7d1">apps/frontend/public/vscode-subbranches-showcase.svg</text>

    <text x="228" y="440" class="mono" font-size="12" fill="#fbbf24">U</text>
    <text x="248" y="440" class="mono" font-size="12" fill="#aab7d1">apps/frontend/src/features/agents/agents-page.tsx</text>

    <text x="228" y="468" class="mono" font-size="12" fill="#6ee7b7">M</text>
    <text x="248" y="468" class="mono" font-size="12" fill="#aab7d1">apps/frontend/src/__integration__/coming-soon-page.test.tsx</text>

    <rect x="566" y="154" width="332" height="34" rx="8" fill="url(#chip)" />
    <text x="582" y="175" class="mono" font-size="12" fill="#d1fae5">Active: subbranch/dashboard-quota-ui</text>

    <rect x="910" y="154" width="270" height="34" rx="8" fill="#0f172a" stroke="#334155" />
    <text x="926" y="175" class="mono" font-size="12" fill="#7dd3fc">base: dev  +2 behind, 0 ahead</text>

    <rect x="1192" y="154" width="270" height="34" rx="8" fill="#0f172a" stroke="#334155" />
    <text x="1208" y="175" class="mono" font-size="12" fill="#86efac">checks: passing (14/14)</text>

    <rect x="566" y="204" width="896" height="558" rx="12" fill="#0d121c" stroke="#223146" />

    <text x="594" y="238" class="mono" font-size="12" fill="#6b7a99">COMMIT PREVIEW</text>
    <line x1="594" y1="248" x2="1436" y2="248" stroke="#223146" />

    <text x="594" y="280" class="mono" font-size="13" fill="#9dd8ff">feat(coming-soon): visualize subbranch changes in vscode-style panel</text>
    <text x="594" y="306" class="mono" font-size="12" fill="#94a3b8">Constraint: keep base branch read-only while subbranches are active</text>
    <text x="594" y="332" class="mono" font-size="12" fill="#94a3b8">Tested: coming-soon-page tests, visual smoke in dev build</text>

    <rect x="594" y="360" width="836" height="186" rx="10" fill="#0a0f18" stroke="#1f2b3f" />
    <text x="612" y="390" class="mono" font-size="12" fill="#9fb0d0">Changed files</text>
    <text x="612" y="420" class="mono" font-size="12" fill="#6ee7b7">M</text>
    <text x="632" y="420" class="mono" font-size="12" fill="#d4def1">coming-soon-page.tsx</text>
    <text x="612" y="446" class="mono" font-size="12" fill="#6ee7b7">M</text>
    <text x="632" y="446" class="mono" font-size="12" fill="#d4def1">account-card.tsx</text>
    <text x="612" y="472" class="mono" font-size="12" fill="#60a5fa">A</text>
    <text x="632" y="472" class="mono" font-size="12" fill="#d4def1">vscode-subbranches-showcase.svg</text>
    <text x="612" y="498" class="mono" font-size="12" fill="#fbbf24">U</text>
    <text x="632" y="498" class="mono" font-size="12" fill="#d4def1">agents-page.tsx</text>
    <text x="612" y="524" class="mono" font-size="12" fill="#6ee7b7">M</text>
    <text x="632" y="524" class="mono" font-size="12" fill="#d4def1">coming-soon-page.test.tsx</text>

    <rect x="594" y="568" width="412" height="162" rx="10" fill="#0a0f18" stroke="#1f2b3f" />
    <text x="612" y="598" class="mono" font-size="12" fill="#9fb0d0">Branch sync status</text>
    <text x="612" y="626" class="mono" font-size="12" fill="#7dd3fc">auth-session-fix ............... merged</text>
    <text x="612" y="650" class="mono" font-size="12" fill="#7dd3fc">dashboard-quota-ui ............ active</text>
    <text x="612" y="674" class="mono" font-size="12" fill="#7dd3fc">branch-merge-guard ............ review</text>
    <text x="612" y="698" class="mono" font-size="12" fill="#86efac">all local verifications passing</text>

    <rect x="1022" y="568" width="408" height="162" rx="10" fill="#0a0f18" stroke="#1f2b3f" />
    <text x="1040" y="598" class="mono" font-size="12" fill="#9fb0d0">Quick actions</text>
    <rect x="1040" y="614" width="370" height="30" rx="8" fill="#0f172a" stroke="#2a3b58" />
    <text x="1054" y="634" class="mono" font-size="12" fill="#93c5fd">git checkout subbranch/dashboard-quota-ui</text>
    <rect x="1040" y="652" width="370" height="30" rx="8" fill="#0f172a" stroke="#2a3b58" />
    <text x="1054" y="672" class="mono" font-size="12" fill="#93c5fd">git commit -m "feat: sync subbranch updates"</text>
    <rect x="1040" y="690" width="370" height="30" rx="8" fill="#0f172a" stroke="#2a3b58" />
    <text x="1054" y="710" class="mono" font-size="12" fill="#93c5fd">gh pr create --fill --base dev</text>

    <rect x="120" y="816" width="1360" height="34" fill="#0f1624" />
    <text x="142" y="838" class="mono" font-size="12" fill="#6ee7b7">recodee</text>
    <text x="202" y="838" class="mono" font-size="12" fill="#8fa1c3">subbranch workflow active</text>
    <text x="1240" y="838" class="mono" font-size="12" fill="#8fa1c3">Ln 84, Col 12</text>
    <text x="1360" y="838" class="mono" font-size="12" fill="#93c5fd">UTF-8</text>
  </g>
</svg>
